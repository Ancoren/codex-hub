version: '3.8'

services:
  codex-hub:
    build: .
    container_name: codex_hub
    ports:
      - "127.0.0.1:8080:8080"
    restart: always
    environment:
      - HUB_ADMIN_PASSWORD=${ADMIN_PASSWORD:-admin}
      - HUB_API_KEY=${API_KEY:-}
      - HUB_STRATEGY=${STRATEGY:-least_used}
      - HUB_HEALTH_CHECK_INTERVAL=300
      - HUB_AUTO_REFRESH_TOKEN=true
      - HUB_LOG_LEVEL=INFO
    volumes:
      - ./data:/app/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s